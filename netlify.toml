[build]
  command = "npm install --prefix client && npm install --prefix server && npm run build --prefix client"
  publish = "client/build"
  base = "/"

[[redirects]]
  from = "/api/*"
  to = "https://eyd-jasa.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
